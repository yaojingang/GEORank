# Alembic 数据库迁移配置
# 文档: https://alembic.sqlalchemy.org

[alembic]
# 迁移脚本目录
script_location = alembic
prepend_sys_path = .

# 数据库连接 URL（由 env.py 动态注入，此处为占位）
sqlalchemy.url = postgresql+asyncpg://georank:change-me-postgres-password@postgres:5432/georank

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
