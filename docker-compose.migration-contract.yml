# CI/runtime override layered onto docker-compose.yml. It keeps the production
# service graph, publishes gateway probes on ephemeral loopback ports, and
# removes persistent volumes and secret env files.
services:
  traefik:
    ports: !override
      - "127.0.0.1:0:80"
    volumes: !override
      - ./infra/traefik:/etc/traefik:ro

  frontend:
    ports: !override
      - "127.0.0.1:0:80"

  postgres:
    environment:
      POSTGRES_DB: georank_contract
      POSTGRES_USER: georank
      POSTGRES_PASSWORD: test-contract-password
    ports: !reset []
    volumes: !reset []

  redis:
    ports: !reset []
    volumes: !reset []

  qdrant:
    ports: !reset []
    volumes: !reset []

  neo4j:
    environment:
      NEO4J_AUTH: neo4j/test-contract-neo4j-password
    ports: !reset []
    volumes: !reset []

  migrate:
    environment:
      DEBUG: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: georank_contract
      POSTGRES_USER: georank
      POSTGRES_PASSWORD: test-contract-password
    volumes: !reset []

  api:
    env_file: !reset []
    environment:
      DEBUG: "false"
      SECRET_KEY: test-contract-secret-key
      SETTINGS_ENCRYPTION_KEY: test-contract-settings-key
      JWT_SECRET: test-contract-jwt-key
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: georank_contract
      POSTGRES_USER: georank
      POSTGRES_PASSWORD: test-contract-password
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: test-contract-neo4j-password
    ports: !reset []
    volumes: !reset []
    labels: !reset []
