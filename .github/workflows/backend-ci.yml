name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "data/public/**"
      - "runtime/homepages/**"
      - "packages/api-sdk/openapi.json"
      - "docker-compose*.yml"
      - "infra/**"
      - "scripts/check-container-migration-bootstrap.sh"
      - "backend/scripts/crawler_import_smoke.py"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - "backend/**"
      - "data/public/**"
      - "runtime/homepages/**"
      - "packages/api-sdk/openapi.json"
      - "docker-compose*.yml"
      - "infra/**"
      - "scripts/check-container-migration-bootstrap.sh"
      - "backend/scripts/crawler_import_smoke.py"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.9-alpine@sha256:7c688148e5e156d0e86df7ba8ae5a05a2386aaec1e2ad8e6d11bdf10504b1fb7
        env:
          POSTGRES_DB: georank_test
          POSTGRES_USER: georank
          POSTGRES_PASSWORD: change-me-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U georank -d georank_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_NAME: GEOrank
      DEBUG: "false"
      SECRET_KEY: ci-secret-key
      SETTINGS_ENCRYPTION_KEY: test-settings-encryption-key
      JWT_SECRET: ci-jwt-secret
      PYTHONPATH: ${{ github.workspace }}/backend
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: georank_test
      POSTGRES_USER: georank
      POSTGRES_PASSWORD: change-me-postgres-password

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check OpenAPI document against the application
        run: python scripts/export_openapi.py --check ../packages/api-sdk/openapi.json

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run backend test suite
        run: python -m tests.run

      - name: Verify container migration bootstrap
        working-directory: .
        run: scripts/check-container-migration-bootstrap.sh

  crawler-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build the pinned crawler image
        run: docker build --file backend/Dockerfile.crawler --tag georank-crawler-ci backend

      - name: Verify Python and crawler imports
        run: docker run --rm --entrypoint python georank-crawler-ci scripts/crawler_import_smoke.py
