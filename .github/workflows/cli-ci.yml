name: CLI CI

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/cli-ci.yml"
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - "cli/**"
      - ".github/workflows/cli-ci.yml"

permissions:
  contents: read

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: cli/pyproject.toml

      - name: Install CLI package
        run: pip install --disable-pip-version-check -e ./cli

      - name: Run CLI test suite
        run: python -m unittest discover -s cli/tests -v

      - name: Verify installed CLI entry point
        run: georank --version
