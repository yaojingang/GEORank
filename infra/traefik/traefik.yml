# Traefik v3 配置文件
# 文档: https://doc.traefik.io/traefik/

# 生产配置关闭 API 和 Dashboard，避免暴露内部路由信息。
api:
  dashboard: false
  insecure: false

# 日志
log:
  level: INFO

# 访问日志
accessLog: {}

# 入口点
entryPoints:
  web:
    address: ":80"
    # 生产环境启用 HTTPS 重定向:
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
  websecure:
    address: ":443"

# 证书解析器（生产环境启用 Let's Encrypt）
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: admin@georank.com
#       storage: /var/lib/traefik/acme.json
#       httpChallenge:
#         entryPoint: web

# 路由配置由只读挂载的文件提供，无需访问 Docker Engine socket。
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true
