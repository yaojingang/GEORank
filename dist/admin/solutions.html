<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>问答管理 - Admin | GEOrank</title>
    <style>body{opacity:0}</style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="../js/tailwind.config.js"></script>
    <link rel="stylesheet" href="../css/common.css?v=20260613-common-hidden-fix">
    <link rel="stylesheet" href="../css/admin.css?v=20260615-admin-kami-controls">
</head>
<body class="bg-slate-50 text-on-surface antialiased">
    <div class="admin-layout">
        <aside id="admin-sidebar" class="admin-sidebar"></aside>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <div class="admin-main">
            <div id="admin-topbar"></div>

            <main class="p-6 lg:p-8 space-y-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-extrabold font-headline tracking-tight">问答管理</h1>
                        <p class="text-sm text-on-surface-variant mt-1">查看所有 GEO AI 问答会话、关联公司和诊断联动上下文</p>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <button id="solutions-template-button" class="btn admin-btn-secondary px-5 py-2.5 rounded-lg text-sm inline-flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">edit_note</span>
                            配置回答模板
                        </button>
                        <button id="solutions-channel-button" class="btn admin-btn-secondary px-5 py-2.5 rounded-lg text-sm inline-flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">tune</span>
                            配置问答频道
                        </button>
                        <a href="/solutions" target="_blank" class="btn admin-btn-secondary px-5 py-2.5 rounded-lg text-sm flex items-center gap-2 self-start">
                            <span class="material-symbols-outlined text-sm">open_in_new</span>
                            查看前台问答页
                        </a>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5">
                    <div class="stat-card">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center">
                                <span class="material-symbols-outlined text-primary text-xl">forum</span>
                            </div>
                            <span class="badge badge-info">总量</span>
                        </div>
                        <p id="solutions-total" class="text-2xl font-extrabold tracking-tight">--</p>
                        <p class="text-xs text-on-surface-variant mt-1 font-medium">问答会话数</p>
                    </div>
                    <div class="stat-card">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-10 h-10 rounded-lg bg-green-50 flex items-center justify-center">
                                <span class="material-symbols-outlined text-green-600 text-xl">chat</span>
                            </div>
                            <span class="badge badge-success">消息</span>
                        </div>
                        <p id="solutions-message-count" class="text-2xl font-extrabold tracking-tight">--</p>
                        <p class="text-xs text-on-surface-variant mt-1 font-medium">当前页消息总数</p>
                    </div>
                    <div class="stat-card">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-10 h-10 rounded-lg bg-purple-50 flex items-center justify-center">
                                <span class="material-symbols-outlined text-purple-600 text-xl">hub</span>
                            </div>
                            <span class="badge badge-warning">关联</span>
                        </div>
                        <p id="solutions-recommendation-count" class="text-2xl font-extrabold tracking-tight">--</p>
                        <p class="text-xs text-on-surface-variant mt-1 font-medium">含关联公司的会话</p>
                    </div>
                    <div class="stat-card">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-10 h-10 rounded-lg bg-orange-50 flex items-center justify-center">
                                <span class="material-symbols-outlined text-orange-500 text-xl">link</span>
                            </div>
                            <span class="badge badge-neutral">诊断联动</span>
                        </div>
                        <p id="solutions-diagnostic-count" class="text-2xl font-extrabold tracking-tight">--</p>
                        <p class="text-xs text-on-surface-variant mt-1 font-medium">关联诊断上下文</p>
                    </div>
                </div>

                <div class="admin-solutions-toolbar">
                    <div class="admin-solutions-toolbar__search">
                        <span class="material-symbols-outlined text-slate-400 text-sm mr-2">search</span>
                        <input id="solutions-search" type="text" placeholder="搜索标题、用户或消息内容..." class="bg-transparent border-none focus:ring-0 text-sm w-full py-2.5 placeholder:text-slate-400">
                    </div>
                    <div class="admin-solutions-toolbar__filters">
                        <select id="solutions-visibility-filter" class="form-input admin-select admin-solutions-select text-sm">
                            <option value="">全部会话</option>
                            <option value="public">公开会话</option>
                            <option value="owned">登录用户</option>
                        </select>
                        <select id="solutions-linkage-filter" class="form-input admin-select admin-solutions-select admin-solutions-select--wide text-sm">
                            <option value="">全部上下文</option>
                            <option value="recommendations">有关联公司</option>
                            <option value="diagnostics">关联诊断</option>
                        </select>
                        <button id="solutions-refresh" class="btn admin-btn-secondary admin-solutions-refresh">
                            <span class="material-symbols-outlined text-sm">refresh</span>
                            <span>刷新</span>
                        </button>
                    </div>
                </div>

                <div id="solutions-template-summary" class="admin-solutions-summary admin-solutions-template-summary">
                    <div class="text-sm text-slate-400">加载回答模板中...</div>
                </div>

                <div id="solutions-channel-summary" class="admin-solutions-summary">
                    <div class="text-sm text-slate-400">加载问答频道中...</div>
                </div>

                <div class="admin-list-layout">
                    <div class="bg-white rounded-xl border border-slate-100 overflow-hidden">
                        <div class="flex items-center justify-between px-6 py-5 border-b border-slate-50">
                            <div>
                                <h3 class="text-base font-bold font-headline">问答会话列表</h3>
                                <p class="text-xs text-on-surface-variant mt-1">按更新时间查看最新问答对话，点击预览按钮查看消息流</p>
                            </div>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>会话</th>
                                    <th>用户</th>
                                    <th>消息数</th>
                                    <th>关联</th>
                                    <th>更新时间</th>
                                    <th class="text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="solutions-tbody">
                                <tr><td colspan="6" class="text-center py-12 text-slate-400 text-sm">加载中...</td></tr>
                            </tbody>
                        </table>
                        <div class="flex items-center justify-between px-6 py-4 border-t border-slate-50 text-sm">
                            <span id="solutions-pagination-info" class="text-on-surface-variant">--</span>
                            <div id="solutions-pagination" class="flex items-center gap-1"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-slate-100 p-6 admin-detail-panel admin-preview-modal" role="dialog" aria-modal="true" aria-labelledby="solution-preview-title" hidden>
                        <div class="flex items-center justify-between mb-5">
                            <h3 id="solution-preview-title" class="text-base font-bold font-headline">会话详情</h3>
                            <div class="flex items-center gap-2">
                                <span id="solutions-detail-badge" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">未选中</span>
                                <button type="button" class="admin-preview-close" data-preview-close title="关闭预览">
                                    <span class="material-symbols-outlined text-base">close</span>
                                </button>
                            </div>
                        </div>
                        <div id="solutions-detail" class="space-y-4">
                            <div class="rounded-xl border border-dashed border-slate-200 bg-slate-50/70 p-6 text-sm text-slate-400">
                                点击列表中的预览按钮，查看消息流、关联公司和诊断联动上下文。
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/admin.js?v=20260615-admin-entry-path"></script>
</body>
</html>
